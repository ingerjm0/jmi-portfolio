<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Professional Portfolio Tile - Shorter Card with CTA Outside</title>
  <desc id="desc">A portfolio tile with a shorter white card, green header, and a centered CTA button below the card.</desc>

  <style>
    :root {
      --text: #1a1a1a;
      --surface: #FFFFFF;
      --header:  #3B7260;
      --outline: #CFCAC2;
      --cta-fill:#1E6B43; /* brand green */
      --cta-text:#ffffff;
      --t1:#DCEBE2;
      --t2:#D6E4EA;
      --t3:#EFE7DA;
      --t4:#F1E5E3;
      --t5:#E6EFE8;
      --t6:#E8E9F1;
    }
    .label {
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, Arial;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: 0.3px;
      fill: #FFF9F2;
    }
    .small {
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, Arial;
      font-weight: 600;
      font-size: 24px;
      letter-spacing: 0.3px;
    }
  </style>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g transform="translate(0,40)" filter="url(#shadow)">
    <rect x="0" y="0" width="410" height="230" rx="16" fill="var(--surface)" stroke="var(--outline)" stroke-width="1.5"/>
    <rect x="0" y="0" width="410" height="56" rx="16" ry="16" fill="var(--header)"/>
    <text x="24" y="36" class="label">Professional Portfolio</text>

    <rect x="20"  y="80" width="110" height="60" rx="10" fill="var(--t1)"/>
    <rect x="150" y="80" width="110" height="60" rx="10" fill="var(--t2)"/>
    <rect x="280" y="80" width="110" height="60" rx="10" fill="var(--t3)"/>
    <rect x="20"  y="155" width="110" height="60" rx="10" fill="var(--t4)"/>
    <rect x="150" y="155" width="110" height="60" rx="10" fill="var(--t5)"/>
    <rect x="280" y="155" width="110" height="60" rx="10" fill="var(--t6)"/>
  </g>

  <g transform="translate(345,250)">
    <rect x="-128" y="0" width="256" height="45" rx="25" fill="var(--cta-fill)"/>
    <text x="0" y="30" text-anchor="middle" class="small" fill="var(--cta-text)">Explore my work</text>
  </g>
</svg>