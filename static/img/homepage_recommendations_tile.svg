<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Recommendations Tile</title>
  <desc id="desc">A recommendations tile with a white background, soft blue-taupe header, speech bubbles, avatars, and a centered green CTA below.</desc>

  <style>
    :root {
      --surface:#FFFFFF;
      --header:#6B8191; /* blue-taupe header */
      --outline:#CFCAC2;
      --cta-fill:#1E6B43;
      --cta-text:#FFFFFF;
      --bubble1:#E9F0EC;
      --bubble2:#EFE7DA;
      --avatar-bg:#E8E9F1;
      --avatar-ring:#CDBCA8;
    }
    .label {
      font-family:'Poppins',system-ui,-apple-system,'Segoe UI',Roboto,Arial;
      font-weight:700;
      font-size:24px;
      fill:#FFF9F2;
    }
    .small {
      font-family:'Poppins',system-ui,-apple-system,'Segoe UI',Roboto,Arial;
      font-weight:600;
      font-size:24px;
      letter-spacing:0.3px;
    }
  </style>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Card -->
  <g transform="translate(80,40)" filter="url(#shadow)">
    <rect x="0" y="0" width="410" height="230" rx="16" fill="var(--surface)" stroke="var(--outline)" stroke-width="1.5"/>
    <rect x="0" y="0" width="410" height="56" rx="16" ry="16" fill="var(--header)"/>
    <text x="24" y="36" class="label">Recommendations</text>

    <!-- Speech bubbles -->
    <g transform="translate(40,70)">
      <rect x="0" y="0" width="180" height="60" rx="14" fill="var(--bubble1)"/>
      <polygon points="30,60 50,60 40,72" fill="var(--bubble1)"/>
      <circle cx="20" cy="30" r="14" fill="var(--avatar-bg)" stroke="var(--avatar-ring)" stroke-width="2"/>
    </g>

    <g transform="translate(210,140)">
      <rect x="0" y="0" width="180" height="60" rx="14" fill="var(--bubble2)"/>
      <polygon points="150,60 170,60 160,72" fill="var(--bubble2)"/>
      <circle cx="166" cy="30" r="14" fill="var(--avatar-bg)" stroke="var(--avatar-ring)" stroke-width="2"/>
    </g>
  </g>

  <!-- Centered CTA -->
  <g transform="translate(160,250)">
    <rect x="-130" y="-7" width="260" height="45" rx="25" fill="var(--cta-fill)"/>
    <text x="0" y="23" text-anchor="middle" class="small" fill="var(--cta-text)">Read testimonials</text>
  </g>
</svg>